<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

  <!-- Babel (JSX in-browser) -->

  <style>
    /* ── Reset ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; }

    /* ── Theme root ───────────────────────────────────────── */
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      transition: background-color 0.3s, color 0.3s;
    }
    .app.light { background-color: #FAFAF9; color: #1A1A1A; }
    .app.dark  { background-color: #1A1A1A; color: #FAFAF9; }

    /* ── Dark/Light toggle ────────────────────────────────── */
    .toggle-wrap { position: absolute; top: 1rem; right: 1rem; }
    .toggle-btn {
      padding: 0.5rem 1.1rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      transition: transform 0.12s;
    }
    .toggle-btn:hover  { transform: scale(1.04); }
    .toggle-btn:active { transform: scale(0.96); }
    .app.light .toggle-btn { background: #fff; color: #1A1A1A; border: 1px solid #e5e7eb; }
    .app.dark  .toggle-btn { background: #374151; color: #FAFAF9; }

    /* ── Gradient helpers ─────────────────────────────────── */
    .grad-text {
      background: linear-gradient(90deg, #F6D365, #FDA085, #E86A92);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .grad-btn {
      background: linear-gradient(90deg, #F6D365, #FDA085, #E86A92);
      color: #fff;
      border: none;
      border-radius: 9999px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .grad-btn:hover  { transform: scale(1.04); box-shadow: 0 8px 20px rgba(253,160,133,0.4); }
    .grad-btn:active { transform: scale(0.97); }

    /* ── START SCREEN ─────────────────────────────────────── */
    .start-screen { text-align: center; padding: 0 1rem; }
    .start-emoji  { font-size: 4rem; margin-bottom: 1rem; }
    .start-title  {
      font-family: 'Georgia', serif;
      font-size: clamp(2.4rem, 7vw, 3.8rem);
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.75rem;
    }
    .start-sub {
      font-size: 1rem;
      margin-bottom: 2rem;
    }
    .app.light .start-sub { color: #6b7280; }
    .app.dark  .start-sub { color: #9ca3af; }
    .start-cta { font-size: 1.1rem; padding: 0.95rem 2.6rem; box-shadow: 0 10px 20px rgba(0,0,0,0.12); }

    /* ── QUESTIONS WRAPPER ────────────────────────────────── */
    .q-wrap { width: 100%; max-width: 28rem; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      margin-bottom: 0.3rem;
    }
    .app.light .progress-header { color: #6b7280; }
    .app.dark  .progress-header { color: #9ca3af; }

    .progress-track {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      margin-bottom: 1rem;
    }
    .app.light .progress-track { background: #e5e7eb; }
    .app.dark  .progress-track { background: #374151; }

    .progress-fill {
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, #F6D365, #FDA085, #E86A92);
      transition: width 0.35s ease;
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      border-radius: 1.5rem;
      border: 1px solid;
      padding: 2rem;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }
    .app.light .card { background: rgba(255,255,255,0.72); border-color: rgba(229,231,235,0.6); }
    .app.dark  .card { background: rgba(31,41,55,0.62);    border-color: rgba(55,65,81,0.4); }

    /* ── Question text ────────────────────────────────────── */
    .q-text {
      font-family: 'Georgia', serif;
      font-size: 1.45rem;
      font-weight: 600;
      line-height: 1.4;
      text-align: center;
      margin-bottom: 1.75rem;
    }

    /* ── Option buttons ───────────────────────────────────── */
    .opt-btn {
      display: block;
      width: 100%;
      padding: 0.8rem 1rem;
      margin-bottom: 0.9rem;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      border: none;
      cursor: pointer;
      transition: all 0.14s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .app.light .opt-btn { background: rgba(255,255,255,0.9); color: #1A1A1A; }
    .app.dark  .opt-btn { background: rgba(55,65,81,0.8);    color: #FAFAF9; }
    .app.light .opt-btn:hover { background: #f3f4f6; }
    .app.dark  .opt-btn:hover { background: rgba(75,85,99,0.85); }
    .opt-btn:active        { transform: scale(0.97); }
    .opt-btn.selected      { outline: 2px solid #E86A92; transform: scale(0.97); }

    /* ── RESULTS ──────────────────────────────────────────── */
    .results-wrap { width: 100%; max-width: 28rem; }

    .overall-block { text-align: center; margin-bottom: 1.5rem; }

    .big-score {
      font-size: 4.5rem;
      font-weight: 700;
      line-height: 1;
    }
    .big-score sup { font-size: 2rem; vertical-align: super; }

    .score-desc { font-size: 0.85rem; margin-top: 0.3rem; }
    .app.light .score-desc { color: #6b7280; }
    .app.dark  .score-desc { color: #9ca3af; }

    .result-badge { font-size: 1.2rem; font-weight: 600; margin-top: 0.5rem; }

    /* ── Domain breakdown ─────────────────────────────────── */
    .domain-list { margin-bottom: 1.5rem; }
    .domain-row  { margin-bottom: 0.75rem; }

    .domain-hd {
      display: flex;
      justify-content: space-between;
      font-size: 0.875rem;
      margin-bottom: 0.3rem;
    }
    .domain-name { font-weight: 500; text-transform: capitalize; }
    .domain-pct  { font-weight: 600; }
    .app.light .domain-pct { color: #374151; }
    .app.dark  .domain-pct { color: #d1d5db; }

    .domain-track { width: 100%; height: 8px; border-radius: 4px; }
    .app.light .domain-track { background: #e5e7eb; }
    .app.dark  .domain-track { background: #374151; }

    .domain-fill {
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(90deg, #F6D365, #FDA085, #E86A92);
      transition: width 0.6s ease;
    }

    .retry-btn { width: 100%; padding: 0.8rem; font-size: 1rem; }

    /* ── Animations ───────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeUp 0.38s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

    const questionsConst = [

      { q: "Romantic comedy or psychological thriller?",                 a: "Romantic comedy",             b: "Psychological thriller",  domain: "emotional" },
      { q: "Classic romance or modern love story?",                      a: "Classic romance",             b: "Modern love story",       domain: "emotional" },
      // Social (15)
      { q: "Netflix night in or dance party?",         a: "Netflix night in",  b: "Dance party",            domain: "social" },
      { q: "Karaoke bar or jazz lounge?",              a: "Karaoke bar",       b: "Jazz lounge",            domain: "social" },
      { q: "Date night or nightclub party?",           a: "Date night",        b: "Nightclub party",        domain: "social" },
      { q: "Comic Con or film festival?",              a: "Comic Con",         b: "Film festival",          domain: "social" },
      { q: "Street food tour or fine dining feast?",   a: "Street food tour",  b: "Fine dining feast",      domain: "social" },
      { q: "Street musician or orchestra hall?",       a: "Street musician",   b: "Orchestra hall",         domain: "social" },
      { q: "Business workshop or creative retreat?",   a: "Business workshop", b: "Creative retreat",       domain: "social" },
      { q: "Trekking or bike trail ride?",             a: "Trekking",          b: "Bike trail ride",        domain: "social" },
      { q: "Ghost stories or true crime?",             a: "Ghost stories",     b: "True crime",             domain: "social" },
      { q: "Live sports or e-sports tournament?",      a: "Live sports",       b: "E-sports tournament",    domain: "social" },
      { q: "Spicy snacks or sweet treats?",            a: "Spicy snacks",      b: "Sweet treats",           domain: "social" },
      { q: "Chai pe charcha or coffee convo?",         a: "Chai pe charcha",   b: "Coffee convo",           domain: "social" },
      { q: "TikTok trends or Instagram aesthetics?",   a: "TikTok trends",     b: "Instagram aesthetics",   domain: "social" },
      { q: "Group travel or solo travel?",             a: "Group travel",      b: "Solo travel",            domain: "social" },
      { q: "Family time or friends night out?",        a: "Family time",       b: "Friends night out",      domain: "social" },
      // Vision (9)
      { q: "Beach vacation or mountain retreat?",            a: "Beach vacation",     b: "Mountain retreat",      domain: "vision" },
      { q: "Planned itinerary or spontaneous adventure?",    a: "Planned itinerary",  b: "Spontaneous adventure", domain: "vision" },
      { q: "Adventure sports or spa retreat?",               a: "Adventure sports",   b: "Spa retreat",           domain: "vision" },
      { q: "Urban hike or rainforest trek?",                 a: "Urban hike",         b: "Rainforest trek",       domain: "vision" },
      { q: "Stargazing app or telescope night?",             a: "Stargazing app",     b: "Telescope night",       domain: "vision" },
      { q: "Sunrise hike or midnight drive?",                a: "Sunrise hike",       b: "Midnight drive",        domain: "vision" },
      { q: "Hostel dorm or luxury hotel?",                   a: "Hostel dorm",        b: "Luxury hotel",          domain: "vision" },
      { q: "City skyline or mountain summit?",               a: "City skyline",       b: "Mountain summit",       domain: "vision" },
      { q: "Classic vinyl or lo-fi beats?",                  a: "Classic vinyl",      b: "Lo-fi beats",           domain: "vision" },
    ];

    /* ─── REFERENCE MAP ─── */
    const referenceMap = {
      "Work from home or cafe workspace?":                   "Work from home",
      "Morning person or night owl?":                        "Night owl",
      "Cook meals at home or eat out?":                      "Cook meals at home",
      "Cook together or order takeout?":                     "Order takeout",
      "DIY cooking or order takeout?":                       "DIY cooking",
      "Yoga or HIIT workout?":                               "HIIT workout",
      "Weight lifting or Calisthenics?":                     "Calisthenics",
      "Netflix binge or book cafe session?":                 "Book cafe session",
      "Long drive or late-night walk?":                      "Long drive",
      "Gaming stream or podcast deep dive?":                 "Podcast deep dive",
      "Online shopping or mall shopping?":                   "Online shopping",
      "Vinyl collector or digital DJ?":                      "Vinyl collector",
      "Physical gaming or mobile gaming?":                   "Physical gaming",
      "Plant parent or pet parent?":                         "Plant parent",
      "Indian cuisine or western cuisine?":                  "Indian cuisine",
      "Coffee or Tea?":                                      "Tea",
      "Fantasy books or movies?":                            "Movies",
      "Funny or serious?":                                   "Funny",
      "Analytical or emotional?":                            "Analytical",
      "Honest or diplomatic?":                               "Diplomatic",
      "Talkative or quietly observant?":                     "Quietly observant",
      "Risk-taker or cautious?":                             "Cautious",
      "Heart or mind?":                                      "Mind",
      "Ambitious or easygoing?":                             "Ambitious",
      "Extrovert or introvert?":                             "Introvert",
      "Leader or follower?":                                 "Leader",
      "City life or small-town life?":                       "City life",
      "Love letter or romantic text?":                       "Love letter",
      "Handwritten note or voice message?":                  "Handwritten note",
      "Share memes or handwritten poems?":                   "Share memes",
      "Good morning call or good night call?":               "Good night call",
      "Candlelit dinner or street-food feast?":              "Candlelit dinner",
      "Flowers or chocolates?":                              "Flowers",
      "Surprise date or planned-together outing?":           "Surprise date",
      "Public display of affection or private moments at home?": "Private moments at home",
      "Grand anniversary celebration or everyday gestures?": "Everyday gestures",
      "Write a love poem or sing your favorite song?":       "Sing your favorite song",
      "Romantic comedy or psychological thriller?":          "Romantic comedy",
      "Classic romance or modern love story?":               "Modern love story",
      "Netflix night in or dance party?":                    "Dance party",
      "Karaoke bar or jazz lounge?":                         "Jazz lounge",
      "Date night or nightclub party?":                      "Date night",
      "Comic Con or film festival?":                         "Film festival",
      "Street food tour or fine dining feast?":              "Fine dining feast",
      "Street musician or orchestra hall?":                  "Orchestra hall",
      "Business workshop or creative retreat?":              "Creative retreat",
      "Trekking or bike trail ride?":                        "Bike trail ride",
      "Ghost stories or true crime?":                        "True crime",
      "Live sports or e-sports tournament?":                 "Live sports",
      "Spicy snacks or sweet treats?":                       "Spicy snacks",
      "Chai pe charcha or coffee convo?":                    "Coffee convo",
      "TikTok trends or Instagram aesthetics?":              "Instagram aesthetics",
      "Group travel or solo travel?":                        "Solo travel",
      "Family time or friends night out?":                   "Friends night out",
      "Beach vacation or mountain retreat?":                 "Mountain retreat",
      "Planned itinerary or spontaneous adventure?":         "Planned itinerary",
      "Adventure sports or spa retreat?":                    "Adventure sports",
      "Urban hike or rainforest trek?":                      "Rainforest trek",
      "Stargazing app or telescope night?":                  "Stargazing app",
      "Sunrise hike or midnight drive?":                     "Midnight drive",
      "Hostel dorm or luxury hotel?":                        "Luxury hotel",
      "City skyline or mountain summit?":                    "Mountain summit",
      "Classic vinyl or lo-fi beats?":                       "Classic vinyl",
    };

    const domainEmoji = {
      lifestyle: "☀️", philosophy: "🧠", emotional: "💗", social: "🎉", vision: "🌄",
    };

    /* ─── Main Component ─── */
    function FlirtFlip() {
      const [darkMode,      setDarkMode]      = useState(false);
      const [stage,         setStage]         = useState("start");
      const [questions,     setQuestions]     = useState([]);
      const [questionIndex, setQuestionIndex] = useState(0);
      const [answers,       setAnswers]       = useState([]);
      const [compatibility, setCompatibility] = useState(null);
      const [selected,      setSelected]      = useState(null);

      const initQuestions = () => {
        const domains = ["lifestyle","philosophy","emotional","social","vision"];
        let picked = domains.flatMap((dom) => {
          const pool = questionsConst.filter((q) => q.domain === dom);
          return pool.sort(() => 0.5 - Math.random()).slice(0, 4);
        }).sort(() => 0.5 - Math.random());

        setQuestions(picked.map((q) => ({ ...q, reference: referenceMap[q.q] })));
        setQuestionIndex(0);
        setAnswers([]);
        setCompatibility(null);
        setSelected(null);
        setStage("questions");
      };

      const handleSelect = (choice) => {
        setSelected(choice);
        setTimeout(() => {
          const next = [...answers, choice];
          setAnswers(next);
          setSelected(null);
          if (questionIndex < questions.length - 1) {
            setQuestionIndex((i) => i + 1);
          } else {
            computeCompatibility(next);
          }
        }, 220);
      };

      const computeCompatibility = (userAns) => {
        const counts  = { lifestyle:0, philosophy:0, emotional:0, social:0, vision:0 };
        const matches = { lifestyle:0, philosophy:0, emotional:0, social:0, vision:0 };
        let totalMatches = 0;
        questions.forEach((q, i) => {
          counts[q.domain]++;
          if (userAns[i] === q.reference) { matches[q.domain]++; totalMatches++; }
        });
        const percentages = {};
        Object.keys(counts).forEach((d) => {
          percentages[d] = counts[d] ? matches[d] / counts[d] : 0;
        });
        setCompatibility({ percentages, overall: questions.length ? totalMatches / questions.length : 0 });
        setStage("results");
      };

      const overallPct  = compatibility ? Math.round(compatibility.overall * 100) : 0;
      const progressPct = questions.length ? Math.round((questionIndex / questions.length) * 100) : 0;
      const resultLabel = overallPct >= 80 ? "💞 Soulmate Match!"
                        : overallPct >= 60 ? "✨ Great Vibe!"
                        : overallPct >= 40 ? "🌱 Growing Chemistry"
                        :                    "🎲 Opposites Attract!";

      return (
        <div className={`app ${darkMode ? "dark" : "light"}`}>

          {/* Toggle */}
          <div className="toggle-wrap">
            <button className="toggle-btn" onClick={() => setDarkMode(!darkMode)}>
              {darkMode ? "🌞 Light" : "🌙 Dark"}
            </button>
          </div>

          {/* ══ START ══ */}
          {stage === "start" && (
            <div className="start-screen fade-in">
              <div className="start-emoji">💘</div>
              <h1 className="start-title grad-text">Flirt Flip</h1>
              <p className="start-sub">20 fun this-or-that questions to reveal your vibe match ✨</p>
              <button className="grad-btn start-cta" onClick={initQuestions}>Start Quiz →</button>
            </div>
          )}

          {/* ══ QUESTIONS ══ */}
          {stage === "questions" && questions.length > 0 && (
            <div className="q-wrap fade-in" key={questionIndex}>
              <div className="progress-header">
                <span>{domainEmoji[questions[questionIndex].domain]} {questions[questionIndex].domain}</span>
                <span>{questionIndex + 1} / {questions.length}</span>
              </div>
              <div className="progress-track">
                <div className="progress-fill" style={{ width: progressPct + "%" }} />
              </div>
              <div className="card">
                <p className="q-text">{questions[questionIndex].q}</p>
                {[questions[questionIndex].a, questions[questionIndex].b].map((opt) => (
                  <button
                    key={opt}
                    className={"opt-btn" + (selected === opt ? " selected" : "")}
                    onClick={() => handleSelect(opt)}
                  >
                    {opt}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* ══ RESULTS ══ */}
          {stage === "results" && compatibility && (
            <div className="results-wrap fade-in">
              <div className="card">
                <div className="overall-block">
                  <div className="big-score grad-text">{overallPct}<sup>%</sup></div>
                  <div className="score-desc">Overall Compatibility</div>
                  <div className="result-badge">{resultLabel}</div>
                </div>
                <div className="domain-list">
                  {Object.entries(compatibility.percentages).map(([domain, pct]) => (
                    <div key={domain} className="domain-row">
                      <div className="domain-hd">
                        <span className="domain-name">{domainEmoji[domain]} {domain}</span>
                        <span className="domain-pct">{Math.round(pct * 100)}%</span>
                      </div>
                      <div className="domain-track">
                        <div className="domain-fill" style={{ width: Math.round(pct * 100) + "%" }} />
                      </div>
                    </div>
                  ))}
                </div>
                <button className="grad-btn retry-btn" onClick={initQuestions}>🔁 Retry</button>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<FlirtFlip />);
  </script>
</body>
</html>
